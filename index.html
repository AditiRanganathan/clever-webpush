<!DOCTYPE html>
<html>
<head>
  <title>Club Mahindra - Personalized Experience</title>

  <!-- CleverTap SDK -->
  <script>
    var clevertap = {
      event:[],
      profile:[],
      account:[],
      onUserLogin:[],
      notifications:[],
      token: "TEST-4c1-a12"
    };

    clevertap.account.push({"id": "TEST-RZ7-Z94-K95Z"});

    (function () {
      var wzrk = document.createElement('script');
      wzrk.type = 'text/javascript';
      wzrk.async = true;
      wzrk.src = "https://d2r1yp2w7bby2u.cloudfront.net/js/clevertap.min.js";
      var s = document.getElementsByTagName('script')[0];
      s.parentNode.insertBefore(wzrk, s);
    })();
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #fff;
    }

    header {
      background: #004d40;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    #banner img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    #banner-text {
      position: absolute;
      top: 200px;
      left: 30px;
      font-size: 32px;
      color: white;
      font-weight: bold;
    }

    #welcome {
      padding: 20px;
      font-size: 22px;
      text-align: center;
    }

    #offers {
      background: #fff3e0;
      padding: 20px;
      text-align: center;
      font-size: 20px;
    }

    #cards {
      padding: 20px;
      text-align: center;
    }

    .card {
      display: inline-block;
      width: 220px;
      margin: 10px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
      font-weight: bold;
    }

    .cta {
      text-align: center;
      margin: 20px;
    }

    button {
      padding: 12px 18px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      background: #00796b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #004d40;
    }
  </style>
</head>

<body>

<header>Club Mahindra</header>

<div id="banner">
  <img id="banner-img" src="https://via.placeholder.com/1200x300">
  <div id="banner-text">Explore Resorts</div>
</div>

<div id="welcome">Welcome, Guest</div>

<div id="offers">🎉 Exclusive offers just for you!</div>

<div id="cards"></div>

<div class="cta">
  <button onclick="loginBeach()">Beach Couple</button>
  <button onclick="loginFamily()">Family Traveler</button>
  <button onclick="loginPremium()">Premium Member</button>
</div>

<script>

/* ---------------- USER LOGIN ---------------- */

function loginBeach(){
  setUser("Beach","Couple","Regular");
}

function loginFamily(){
  setUser("Mountain","Family","Regular");
}

function loginPremium(){
  setUser("Beach","Couple","Premium");
}

function setUser(pref, type, tier){
  clevertap.onUserLogin.push({
    "Site": {
      "Name": "Demo User",
      "Identity": pref + "_" + type + "_" + tier,
      "Travel Preference": pref,
      "User Type": type,
      "Loyalty Tier": tier
    }
  });
}


/* ---------------- PX IMPLEMENTATION ---------------- */

window.addEventListener("load", function(){

  // VARIABLES
  const bannerTextVar = clevertap.defineVariable("homepage_banner", "Explore Resorts");
  const bannerImageVar = clevertap.defineVariable("banner_image", "https://via.placeholder.com/1200x300");
  const recVar = clevertap.defineVariable("recommendations", "[]");
  const offerVar = clevertap.defineVariable("offer_text", "🎉 Exclusive offers just for you!");
  const welcomeVar = clevertap.defineVariable("welcome_text", "Welcome, Guest");
  const bgColorVar = clevertap.defineVariable("bg_color", "#ffffff");

  function updateUI(){

    // Banner
    document.getElementById("banner-text").innerText = bannerTextVar.getValue();
    document.getElementById("banner-img").src = bannerImageVar.getValue();

    // Welcome
    document.getElementById("welcome").innerText = welcomeVar.getValue();

    // Offer
    document.getElementById("offers").innerText = offerVar.getValue();

    // Theme
    document.body.style.backgroundColor = bgColorVar.getValue();

    // Recommendations
    const container = document.getElementById("cards");
    container.innerHTML = "";

    try {
      const items = JSON.parse(recVar.getValue());

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <img src="${item.image}">
          <p>${item.name}</p>
        `;

        container.appendChild(div);
      });

    } catch(e){
      console.log("Invalid JSON");
    }
  }

  // LISTENERS
  bannerTextVar.addValueChangedCallback(updateUI);
  bannerImageVar.addValueChangedCallback(updateUI);
  recVar.addValueChangedCallback(updateUI);
  offerVar.addValueChangedCallback(updateUI);
  welcomeVar.addValueChangedCallback(updateUI);
  bgColorVar.addValueChangedCallback(updateUI);

  clevertap.addVariablesChangedCallback(() => {
    console.log("PX Updated");
    updateUI();
  });

  // INIT
  clevertap.setLogLevel(4);

  clevertap.syncVariables(
    () => console.log("Sync success"),
    () => console.log("Sync failed")
  );

  clevertap.fetchVariables(() => {
    console.log("Fetch success");
    updateUI();
  });

});

</script>

</body>
</html>
