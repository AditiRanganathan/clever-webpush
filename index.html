<!DOCTYPE html>
<html>
<head>
  <title>CleverTap PX - Banner Personalization</title>

  <!-- CleverTap SDK -->
  <script>
    var clevertap = {
      event:[],
      profile:[],
      account:[],
      onUserLogin:[],
      notifications:[],
      token: "TEST-4c1-a12" 
    };

    clevertap.account.push({"id": "TEST-RZ7-Z94-K95Z"});

    (function () {
      var wzrk = document.createElement('script');
      wzrk.type = 'text/javascript';
      wzrk.async = true;
      wzrk.src = "https://d2r1yp2w7bby2u.cloudfront.net/js/clevertap.min.js";
      var s = document.getElementsByTagName('script')[0];
      s.parentNode.insertBefore(wzrk, s);
    })();
  </script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    #banner {
      text-align: center;
      color: white;
    }

    #banner img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    #banner-text {
      position: relative;
      margin-top: -60px;
      font-size: 28px;
      font-weight: bold;
    }

    #cards {
      padding: 20px;
      text-align: center;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      width: 200px;
      border-radius: 8px;
    }

    button {
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- Banner -->
<div id="banner">
  <img id="banner-img" src="https://via.placeholder.com/1200x300">
  <div id="banner-text">Explore Resorts</div>
</div>

<!-- Recommendations -->
<div id="cards"></div>

<!-- Buttons for testing -->
<div style="text-align:center;">
  <button onclick="loginBeach()">Beach User</button>
  <button onclick="loginFamily()">Family User</button>
  <button onclick="loginPremium()">Premium User</button>
</div>

<script>

/* ---------------- USER LOGIN SIMULATION ---------------- */

function loginBeach(){
  setUser("Beach","Couple","Regular");
}

function loginFamily(){
  setUser("Mountain","Family","Regular");
}

function loginPremium(){
  setUser("Beach","Couple","Premium");
}

function setUser(pref, type, tier){
  clevertap.onUserLogin.push({
    "Site": {
      "Name": "Aditi",
      "Identity": Math.floor(Math.random()*10000),
      "Travel Preference": pref,
      "User Type": type,
      "Loyalty Tier": tier
    }
  });
}


/* ---------------- PX IMPLEMENTATION ---------------- */

window.addEventListener("load", function(){

  // 🔹 Define variables
  const bannerTextVar = clevertap.defineVariable("homepage_banner", "Explore Resorts");
  const bannerImageVar = clevertap.defineVariable("banner_image", "https://via.placeholder.com/1200x300");
  const recVar = clevertap.defineVariable("recommendations", "[]");


  // 🔹 Banner text update
  bannerTextVar.addValueChangedCallback((v) => {
    document.getElementById("banner-text").innerText = v.getValue();
  });

  // 🔹 Banner image update
  bannerImageVar.addValueChangedCallback((v) => {
    document.getElementById("banner-img").src = v.getValue();
  });

  // 🔹 Recommendations update
  recVar.addValueChangedCallback((v) => {
    const container = document.getElementById("cards");
    container.innerHTML = "";

    try {
      const items = JSON.parse(v.getValue());

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = item;
        container.appendChild(div);
      });

    } catch(e){
      console.log("Invalid JSON format");
    }
  });


  // 🔹 Global callback
  clevertap.addVariablesChangedCallback(() => {
    console.log("PX variables updated");
  });


  // 🔹 Enable debug + sync variables (ONLY for setup)
  clevertap.setLogLevel(4);

  clevertap.syncVariables(
    () => console.log("Sync success"),
    () => console.log("Sync failed")
  );


  // 🔹 Fetch variables
  clevertap.fetchVariables(
    () => console.log("Fetch success")
  );

});

</script>

</body>
</html>
